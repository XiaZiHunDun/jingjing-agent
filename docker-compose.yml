# ============================================================
# Agent Learn 2 - Docker Compose 配置
# 使用: docker compose up -d
# ============================================================

version: '3.8'

services:
  jingjing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时使用代理（从 .env 读取，可选）
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
    container_name: jingjing-agent
    ports:
      - "8501:8501"
    volumes:
      # 持久化数据目录
      - ./data:/app/data
      # 环境变量文件（应用读取 API Key 等配置）
      - ./.env:/app/.env:ro
    environment:
      # 只传递必要的环境变量，不传递代理
      - TZ=Asia/Shanghai
      - KIMI_API_KEY=${KIMI_API_KEY}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# 可选：如果需要独立的向量数据库服务
# volumes:
#   chroma_data:
