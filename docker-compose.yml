# ============================================================
# Agent Learn 2 - Docker Compose 配置
# 使用: docker-compose up -d
# ============================================================

version: '3.8'

services:
  jingjing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jingjing-agent
    ports:
      - "8501:8501"
    volumes:
      # 持久化数据目录
      - ./data:/app/data
      # 环境变量文件
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# 可选：如果需要独立的向量数据库服务
# volumes:
#   chroma_data:
